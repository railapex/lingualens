<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinguaLens — Debug Tools</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 0 auto; background: #1a1a1a; color: #eee; padding: 0 20px 40px; }
    input, select, button { font-size: 16px; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: #eee; }
    input { width: 100%; box-sizing: border-box; }
    select { min-width: 140px; }
    button { cursor: pointer; background: #3a6; border-color: #3a6; color: #fff; }
    button:disabled { opacity: 0.5; cursor: default; }
    button.secondary { background: #555; border-color: #555; }
    .row { display: flex; gap: 8px; margin: 12px 0; align-items: center; flex-wrap: wrap; }
    h3 { margin: 24px 0 8px; color: #aaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .status-bar { display: flex; gap: 16px; margin: 16px 0; padding: 12px; background: #222; border-radius: 8px; font-size: 14px; }
    .status-bar .label { color: #777; }
    .status-bar .value { color: #5e5; font-weight: bold; }
    .status-bar .value.warn { color: #e95; }
    .status-bar .value.err { color: #e55; }
    .log { white-space: pre-wrap; font-family: monospace; font-size: 13px; color: #aaa; margin-top: 20px; max-height: 300px; overflow-y: auto; }
    .err { color: #e55; }
    .ok { color: #5e5; }
    .info { color: #8af; }
    .presets { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .presets button { font-size: 13px; padding: 4px 10px; background: #333; border-color: #555; }

    /* Tabs */
    .debug-tabs { display: flex; border-bottom: 1px solid #444; margin-bottom: 16px; }
    .debug-tab { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: #888; font-size: 14px; font-weight: 500; cursor: pointer; }
    .debug-tab:hover { color: #ccc; }
    .debug-tab.active { color: #5b9cf0; border-bottom-color: #5b9cf0; }
    .debug-panel { display: none; }
    .debug-panel.active { display: block; }

    /* Translation tab */
    .translate-result { padding: 16px; background: #222; border-radius: 8px; margin: 12px 0; min-height: 60px; }
    .translate-result .source { color: #888; font-size: 13px; margin-bottom: 4px; }
    .translate-result .target { color: #eee; font-size: 18px; font-weight: 500; }
    .translate-result .meta { color: #666; font-size: 12px; margin-top: 8px; }

    /* System tab */
    .config-dump { background: #222; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; color: #aaa; }
    .sys-grid { display: grid; grid-template-columns: 140px 1fr; gap: 6px 12px; margin: 12px 0; font-size: 14px; }
    .sys-grid .label { color: #777; }
    .sys-grid .val { color: #eee; }
  </style>
</head>
<body>
  <h2>LinguaLens Debug Tools</h2>

  <div class="debug-tabs">
    <button class="debug-tab active" data-panel="tts">TTS</button>
    <button class="debug-tab" data-panel="translate">Translation</button>
    <button class="debug-tab" data-panel="system">System</button>
  </div>

  <!-- TTS Panel -->
  <div id="panel-tts" class="debug-panel active">
    <div class="status-bar">
      <div><span class="label">Device:</span> <span id="device" class="value">...</span></div>
      <div><span class="label">Model:</span> <span id="model-status" class="value">...</span></div>
      <div><span class="label">Last Latency:</span> <span id="latency" class="value">—</span></div>
    </div>

    <input id="text" value="Buenos dias, mi amor" placeholder="Text to speak...">

    <div class="presets">
      <button onclick="setText('Hola')">Hola</button>
      <button onclick="setText('Buenos dias, mi amor')">Buenos dias</button>
      <button onclick="setText('¿Como estas hoy?')">Como estas</button>
      <button onclick="setText('Me gustaria una cerveza por favor')">Cerveza</button>
      <button onclick="setText('No hay de que')">No hay de que</button>
      <button onclick="setText('Good morning, my love')">Good morning</button>
      <button onclick="setText('The weather is beautiful today')">Weather</button>
    </div>

    <h3>Kokoro TTS (Rust GPU)</h3>
    <div class="row">
      <select id="lang">
        <option value="es">Spanish</option>
        <option value="en">English</option>
      </select>
      <select id="kokoroVoice">
        <option value="">Default</option>
      </select>
      <button id="btnKokoro">Speak</button>
      <button id="btnStop" class="secondary">Stop All</button>
    </div>
    <div id="phonemes" style="font-family: monospace; color: #8af; margin: 8px 0; font-size: 14px;"></div>

    <h3>Web Speech API (comparison)</h3>
    <div class="row">
      <select id="webVoice"></select>
      <button id="btnWeb">Speak</button>
    </div>

    <h3>A/B Compare</h3>
    <div class="row">
      <button id="btnAB" class="secondary">Play Kokoro then Web Speech</button>
    </div>

    <div id="log" class="log"></div>
  </div>

  <!-- Translation Panel -->
  <div id="panel-translate" class="debug-panel">
    <h3>Translate</h3>
    <input id="tr-text" value="Good morning" placeholder="Text to translate...">
    <div class="row">
      <select id="tr-source">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
      </select>
      <span style="color:#666">&rarr;</span>
      <select id="tr-target">
        <option value="es">Spanish</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
      </select>
      <button id="btnTranslate">Translate</button>
      <button id="btnDetect" class="secondary">Detect Language</button>
    </div>

    <div id="tr-result" class="translate-result" style="display:none;">
      <div class="source" id="tr-result-source"></div>
      <div class="target" id="tr-result-target"></div>
      <div class="meta" id="tr-result-meta"></div>
    </div>

    <div id="tr-log" class="log"></div>
  </div>

  <!-- System Panel -->
  <div id="panel-system" class="debug-panel">
    <h3>Status</h3>
    <div class="sys-grid">
      <span class="label">TTS Device:</span> <span class="val" id="sys-device">...</span>
      <span class="label">TTS Ready:</span> <span class="val" id="sys-tts-ready">...</span>
      <span class="label">History Count:</span> <span class="val" id="sys-history-count">...</span>
    </div>

    <h3>Config</h3>
    <div id="sys-config" class="config-dump">Loading...</div>
    <div class="row" style="margin-top:8px;">
      <button id="btnRefreshConfig" class="secondary">Refresh</button>
    </div>
  </div>

  <script type="module">
    const isTauri = window.__TAURI_INTERNALS__ !== undefined;

    let invoke;
    if (isTauri) {
      const core = await import('@tauri-apps/api/core');
      invoke = core.invoke;
    }

    // --- Tab switching ---
    document.querySelectorAll('.debug-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.debug-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.debug-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
        if (tab.dataset.panel === 'system') refreshSystem();
      });
    });

    // ===== TTS TAB =====

    const textEl = document.getElementById('text');
    const langEl = document.getElementById('lang');
    const voiceEl = document.getElementById('kokoroVoice');
    const webVoiceEl = document.getElementById('webVoice');
    const btnKokoro = document.getElementById('btnKokoro');
    const btnWeb = document.getElementById('btnWeb');
    const btnStop = document.getElementById('btnStop');
    const btnAB = document.getElementById('btnAB');
    const phonemesEl = document.getElementById('phonemes');
    const deviceEl = document.getElementById('device');
    const modelStatusEl = document.getElementById('model-status');
    const latencyEl = document.getElementById('latency');
    const logEl = document.getElementById('log');

    let audioCtx = null;
    let currentSource = null;

    window.setText = (t) => { textEl.value = t; };

    function log(msg, cls = '') {
      const el = document.createElement('div');
      el.className = cls;
      el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.prepend(el);
    }

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    async function playWavBytes(wavBytes) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') await ctx.resume();
      const buffer = new Uint8Array(wavBytes).buffer;
      const decoded = await ctx.decodeAudioData(buffer);
      return new Promise((resolve) => {
        const source = ctx.createBufferSource();
        source.buffer = decoded;
        source.connect(ctx.destination);
        source.onended = () => { currentSource = null; resolve(); };
        currentSource = source;
        source.start();
      });
    }

    function stopAll() {
      if (currentSource) { try { currentSource.stop(); } catch {} currentSource = null; }
      speechSynthesis.cancel();
    }

    async function speakKokoro() {
      const text = textEl.value.trim();
      const lang = langEl.value;
      const voice = voiceEl.value || undefined;
      if (!text) return;
      stopAll();

      try {
        if (isTauri) {
          invoke('get_ipa', { text, lang }).then(ipa => {
            phonemesEl.textContent = `IPA: ${ipa}`;
          }).catch(() => {});
        } else {
          fetch(`/api/phonemize?text=${encodeURIComponent(text)}&lang=${lang === 'es' ? 'es' : 'en-us'}`)
            .then(r => r.json()).then(d => { phonemesEl.textContent = `IPA: ${d.ipa}`; }).catch(() => {});
        }

        log(`Kokoro: "${text}" [${lang}]${voice ? ` voice=${voice}` : ''}`, 'info');
        const t0 = performance.now();

        if (isTauri) {
          const wavBytes = await invoke('speak', { text, lang, voice: voice || null });
          const elapsed = performance.now() - t0;
          latencyEl.textContent = `${elapsed.toFixed(0)}ms`;
          log(`Generated in ${elapsed.toFixed(0)}ms (${wavBytes.length} bytes)`, 'ok');
          await playWavBytes(wavBytes);
        } else {
          const params = new URLSearchParams({ text, lang });
          if (voice) params.set('voice', voice);
          const resp = await fetch(`/api/speak?${params}`);
          if (!resp.ok) throw new Error(await resp.text());
          const wavBuf = await resp.arrayBuffer();
          const elapsed = performance.now() - t0;
          latencyEl.textContent = `${elapsed.toFixed(0)}ms`;
          log(`Generated in ${elapsed.toFixed(0)}ms (${wavBuf.byteLength} bytes)`, 'ok');
          await playWavBytes(new Uint8Array(wavBuf));
        }
      } catch (e) {
        log(`Kokoro failed: ${e}`, 'err');
        latencyEl.textContent = 'ERR';
      }
    }

    function populateWebVoices() {
      const voices = speechSynthesis.getVoices();
      webVoiceEl.innerHTML = '';
      const sorted = [...voices].sort((a, b) => {
        const aEs = a.lang.startsWith('es') ? 0 : 1;
        const bEs = b.lang.startsWith('es') ? 0 : 1;
        if (aEs !== bEs) return aEs - bEs;
        const aEn = a.lang.startsWith('en') ? 0 : 1;
        const bEn = b.lang.startsWith('en') ? 0 : 1;
        if (aEn !== bEn) return aEn - bEn;
        return a.name.localeCompare(b.name);
      });
      for (const v of sorted) {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} [${v.lang}]`;
        webVoiceEl.appendChild(opt);
      }
      log(`Found ${voices.length} Web Speech voices`);
    }
    speechSynthesis.onvoiceschanged = populateWebVoices;
    populateWebVoices();

    function speakWeb() {
      const text = textEl.value.trim();
      if (!text) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      const voices = speechSynthesis.getVoices();
      const selected = voices.find(v => v.name === webVoiceEl.value);
      if (selected) { u.voice = selected; u.lang = selected.lang; }
      log(`Web Speech: "${text}" voice=${selected?.name || 'default'} [${selected?.lang}]`);
      speechSynthesis.speak(u);
    }

    async function abCompare() {
      log('A/B Compare: Kokoro first, then Web Speech', 'info');
      await speakKokoro();
      await new Promise(r => setTimeout(r, 500));
      speakWeb();
    }

    async function loadVoices() {
      if (!isTauri) return;
      try {
        const voices = await invoke('list_voices');
        voiceEl.innerHTML = '<option value="">Default</option>';
        for (const v of voices) {
          const opt = document.createElement('option');
          opt.value = v.name;
          opt.textContent = `${v.name} (${v.lang} ${v.gender})`;
          voiceEl.appendChild(opt);
        }
      } catch (e) {
        log(`Failed to load voices: ${e}`, 'err');
      }
    }

    async function checkStatus() {
      if (!isTauri) {
        deviceEl.textContent = 'N/A (browser)';
        deviceEl.className = 'value warn';
        modelStatusEl.textContent = 'N/A';
        return;
      }
      try {
        const s = await invoke('get_tts_status');
        deviceEl.textContent = s.device;
        deviceEl.className = 'value' + (s.device === 'cuda' ? '' : s.device === 'directml' ? '' : ' warn');
        modelStatusEl.textContent = s.ready ? 'Ready' : s.model_loaded ? 'Downloaded' : 'Missing';
        modelStatusEl.className = 'value' + (s.ready ? '' : s.model_loaded ? ' warn' : ' err');
      } catch (e) {
        deviceEl.textContent = 'Error';
        deviceEl.className = 'value err';
      }
    }

    btnKokoro.addEventListener('click', speakKokoro);
    btnWeb.addEventListener('click', speakWeb);
    btnStop.addEventListener('click', stopAll);
    btnAB.addEventListener('click', abCompare);

    checkStatus();
    loadVoices();
    log('Debug UI ready');

    // ===== TRANSLATION TAB =====

    const trTextEl = document.getElementById('tr-text');
    const trSourceEl = document.getElementById('tr-source');
    const trTargetEl = document.getElementById('tr-target');
    const btnTranslate = document.getElementById('btnTranslate');
    const btnDetect = document.getElementById('btnDetect');
    const trResult = document.getElementById('tr-result');
    const trResultSource = document.getElementById('tr-result-source');
    const trResultTarget = document.getElementById('tr-result-target');
    const trResultMeta = document.getElementById('tr-result-meta');
    const trLogEl = document.getElementById('tr-log');

    function trLog(msg, cls = '') {
      const el = document.createElement('div');
      el.className = cls;
      el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      trLogEl.prepend(el);
    }

    btnTranslate.addEventListener('click', async () => {
      if (!isTauri) { trLog('Translate requires Tauri', 'err'); return; }
      const text = trTextEl.value.trim();
      if (!text) return;

      trLog(`Translating: "${text}" [${trSourceEl.value} → ${trTargetEl.value}]`, 'info');
      const t0 = performance.now();
      try {
        const result = await invoke('translate_text', {
          text,
          sourceLang: trSourceEl.value,
          targetLang: trTargetEl.value,
        });
        const elapsed = performance.now() - t0;
        trResult.style.display = 'block';
        trResultSource.textContent = `${text} (${trSourceEl.value.toUpperCase()})`;
        trResultTarget.textContent = result;
        trResultMeta.textContent = `${elapsed.toFixed(0)}ms`;
        trLog(`Result: "${result}" in ${elapsed.toFixed(0)}ms`, 'ok');
      } catch (e) {
        trLog(`Translation failed: ${e}`, 'err');
      }
    });

    btnDetect.addEventListener('click', async () => {
      if (!isTauri) { trLog('Detect requires Tauri', 'err'); return; }
      const text = trTextEl.value.trim();
      if (!text) return;

      const t0 = performance.now();
      try {
        const lang = await invoke('detect_language', { text });
        const elapsed = performance.now() - t0;
        trLog(`Detected: ${lang.toUpperCase()} in ${elapsed.toFixed(0)}ms`, 'ok');
      } catch (e) {
        trLog(`Detection failed: ${e}`, 'err');
      }
    });

    // ===== SYSTEM TAB =====

    const sysConfigEl = document.getElementById('sys-config');
    const sysDeviceEl = document.getElementById('sys-device');
    const sysTtsReadyEl = document.getElementById('sys-tts-ready');
    const sysHistoryCountEl = document.getElementById('sys-history-count');

    async function refreshSystem() {
      if (!isTauri) {
        sysConfigEl.textContent = 'Requires Tauri runtime';
        return;
      }
      try {
        const [cfg, status, histCount] = await Promise.all([
          invoke('get_config'),
          invoke('get_tts_status'),
          invoke('get_history_count', {}).catch(() => '?'),
        ]);

        sysConfigEl.textContent = JSON.stringify(cfg, null, 2);
        sysDeviceEl.textContent = status.device;
        sysTtsReadyEl.textContent = status.ready ? 'Yes' : 'No';
        sysHistoryCountEl.textContent = String(histCount);
      } catch (e) {
        sysConfigEl.textContent = `Error: ${e}`;
      }
    }

    document.getElementById('btnRefreshConfig').addEventListener('click', refreshSystem);

    // Listen for config changes
    if (isTauri) {
      const { listen } = await import('@tauri-apps/api/event');
      listen('config-changed', () => {
        if (document.getElementById('panel-system').classList.contains('active')) {
          refreshSystem();
        }
      });
    }
  </script>
</body>
</html>
