name: CI

on:
  push:
    branches: [main, macos-port]
  pull_request:
    branches: [main, macos-port]

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Windows-only: CUDA toolkit
      - if: matrix.os == 'windows-latest'
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.0'
          method: 'network'
          use-github-cache: true
          use-local-cache: false

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # Windows: install espeak-ng from GitHub release (choco source is unreliable)
      - if: matrix.os == 'windows-latest'
        name: Install espeak-ng (Windows)
        shell: bash
        run: |
          curl -sL "https://github.com/espeak-ng/espeak-ng/releases/download/1.51/espeak-ng-X64.msi" -o espeak-ng.msi
          msiexec //i espeak-ng.msi //qn //norestart
          # msiexec runs async — wait for install to complete
          for i in {1..30}; do
            [[ -f "C:/Program Files/eSpeak NG/espeak-ng.exe" ]] && break
            sleep 1
          done

      # macOS: install espeak-ng via brew
      - if: matrix.os == 'macos-latest'
        name: Install espeak-ng (macOS)
        run: brew install espeak-ng

      - name: Install frontend dependencies
        run: npm ci

      - name: Copy espeak-ng resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources/espeak-ng
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            ESPEAK_DIR="C:/Program Files/eSpeak NG"
            cp "$ESPEAK_DIR/espeak-ng.exe" src-tauri/resources/espeak-ng/
            cp "$ESPEAK_DIR/libespeak-ng.dll" src-tauri/resources/espeak-ng/
            cp -r "$ESPEAK_DIR/espeak-ng-data" src-tauri/resources/espeak-ng/
          else
            # macOS — Homebrew installs to /opt/homebrew (ARM) or /usr/local (Intel)
            if [[ -f /opt/homebrew/bin/espeak-ng ]]; then
              ESPEAK_BIN=/opt/homebrew/bin/espeak-ng
              ESPEAK_DATA=/opt/homebrew/share/espeak-ng-data
            else
              ESPEAK_BIN=/usr/local/bin/espeak-ng
              ESPEAK_DATA=/usr/local/share/espeak-ng-data
            fi
            cp "$ESPEAK_BIN" src-tauri/resources/espeak-ng/
            cp -r "$ESPEAK_DATA" src-tauri/resources/espeak-ng/
            # Homebrew files may have restricted permissions; Tauri's build script
            # needs to read all bundled resources
            chmod -R u+rw src-tauri/resources/espeak-ng/
          fi

      - name: cargo check
        working-directory: src-tauri
        shell: bash
        run: cargo check
        env:
          CUDAFLAGS: ${{ matrix.os == 'windows-latest' && '--allow-unsupported-compiler' || '' }}

      # macOS: run tests normally (no GPU DLL issues)
      - if: matrix.os == 'macos-latest'
        name: cargo test
        working-directory: src-tauri
        shell: bash
        run: cargo test

      # Windows: the compiled binary has hard PE imports for nvcuda.dll, cublas64_13.dll,
      # directml.dll etc. (from ort's target-conditional CUDA/DirectML features).
      # These DLLs don't exist on CI runners (no GPU driver). The test binary can't even
      # load — STATUS_DLL_NOT_FOUND at process start before any test code runs.
      # cargo test --no-run validates that tests compile and link successfully.
      # Actual test execution happens on macOS CI (no GPU DLL issue) and locally on Windows.
      - if: matrix.os == 'windows-latest'
        name: cargo test --no-run (build-only — no GPU drivers in CI)
        working-directory: src-tauri
        shell: bash
        run: cargo test --no-run
        env:
          CUDAFLAGS: '--allow-unsupported-compiler'

      - name: Frontend build
        run: npm run vite:build
