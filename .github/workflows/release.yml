name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.0'
          method: 'network'
          use-github-cache: true
          use-local-cache: false

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install espeak-ng
        shell: pwsh
        run: choco install espeak-ng -y --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Copy espeak-ng resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources/espeak-ng
          ESPEAK_DIR="C:/Program Files/eSpeak NG"
          cp "$ESPEAK_DIR/espeak-ng.exe" src-tauri/resources/espeak-ng/
          cp "$ESPEAK_DIR/libespeak-ng.dll" src-tauri/resources/espeak-ng/
          cp -r "$ESPEAK_DIR/espeak-ng-data" src-tauri/resources/espeak-ng/

      - name: Build Tauri app
        run: npx tauri build
        env:
          CUDAFLAGS: "--allow-unsupported-compiler"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate update manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NSIS_ZIP=$(find src-tauri/target/release/bundle/nsis -name '*.nsis.zip' | head -1)
          SIGNATURE=$(cat "${NSIS_ZIP}.sig")
          FILENAME=$(basename "$NSIS_ZIP")
          TAG="${GITHUB_REF_NAME}"
          jq --null-input \
            --arg version "$VERSION" \
            --arg notes "See https://github.com/railapex/lingualens/releases/tag/$TAG" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIGNATURE" \
            --arg url "https://github.com/railapex/lingualens/releases/download/$TAG/$FILENAME" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: {"windows-x86_64": {signature: $sig, url: $url}}}' \
            > latest.json

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            latest.json
          generate_release_notes: true
