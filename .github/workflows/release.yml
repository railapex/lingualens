name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.0'

      - name: Install frontend dependencies
        run: npm ci

      - name: Copy espeak-ng resources
        shell: bash
        run: |
          mkdir -p src-tauri/resources/espeak-ng
          ESPEAK_DIR="C:/Program Files/eSpeak NG"
          if [ -d "$ESPEAK_DIR" ]; then
            cp "$ESPEAK_DIR/espeak-ng.exe" src-tauri/resources/espeak-ng/
            cp "$ESPEAK_DIR/libespeak-ng.dll" src-tauri/resources/espeak-ng/
            cp -r "$ESPEAK_DIR/espeak-ng-data" src-tauri/resources/espeak-ng/
          else
            echo "::warning::espeak-ng not found, IPA/TTS will be unavailable"
          fi

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CUDAFLAGS: "--allow-unsupported-compiler"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/latest.json
          generate_release_notes: true
